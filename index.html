<!DOCTYPE html>
 <html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Store</title>
    <link rel="stylesheet" href="./style.css">
</head>
<header>
    <nav>
    <img src="./images/google-logo.png" alt="Google Logo">
    <ul class="menu">
        <li>Phones</li>
        <li>Earbuds</li>
        <li>Watches</li>
        <li>Smart home</li>
        <li>Accessories</li>
        <li>Subscriptions</li>   
    </ul>
    <img src="./images/icons/Search.svg">
    <img src="./images/icons/Help.svg">
    <img src="./images/icons/Cart.svg">
    <img src="./images/icons/Avatar.svg">
    </nav>
</header>
<body>
<main>
    <section class="galeria">
    <div class="arrow" >
          <a  href="./products.html"><img src="./images/icons/Arrow.svg" alt="descrition"></a>
          <span>product details</span>
    </div>
    <div class="product-view">
        <div class="thumbnails">
                <img  src="./images/earbuds/earbuds_01.png"class="zoom" alt="casco">
                <img src="./images/earbuds/earbuds_02.png"class="zoom" alt="casco">
                <img src="./images/earbuds/earbuds_03.png"class="zoom" alt="casco">
                <img src="./images/earbuds/earbuds_04.png"class="zoom" alt="casco">  
        </div>
        <div class="imgcentral">
            <img id="mainDisplay" src="./images/earbuds/earbuds_01.png">
        </div>
    </div>
    </section>
     <section class="info">
        <div class="info1">
            <h1>Google Pixel Buds Pro</h1>
            <p>Music & Sounds</p>
            <h2>229.00€</h2>
        </div>
        <hr>
        <p>Choose a color</p>
        <div class="colorselection">
            <span class="color1"></span>
            <span class="color2"></span>
            <span class="color3"></span>
            <span class="color4"></span>
            <span class="color5"></span>
            <span class="color6"></span>
        </div>
        </section>
        <section>
            <h2>229.00€</h2>
        </section>
    </main>  
</body>
</html>
